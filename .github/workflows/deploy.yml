name: MedApp CD — Deploy

on:
  push:
    branches: [main]

# ── Required for pushing to GitHub Container Registry ──
permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          # GHCR requires lowercase repository and owner names
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker build -t ghcr.io/$REPO_LOWER:latest -t ghcr.io/$REPO_LOWER:${{ github.sha }} .
          docker push ghcr.io/$REPO_LOWER:latest
          docker push ghcr.io/$REPO_LOWER:${{ github.sha }}
          echo "IMAGE_TAG=ghcr.io/$REPO_LOWER:latest" >> $GITHUB_ENV

      - name: Deployment summary
        run: |
          echo "✅ Docker image pushed to:"
          echo "   ${{ env.IMAGE_TAG }}"
          echo ""
          echo "Pull and run on your server:"
          echo "   docker pull ${{ env.IMAGE_TAG }}"
          echo "   docker-compose up -d"
